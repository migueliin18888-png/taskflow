<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gestión de Tareas Colaborativas</title>
  <link rel="stylesheet" href="/src/css/styles.css" />
</head>
<body>
  <!-- Barra superior -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-icon">✅</span>
      <span class="brand-name">TaskFlow</span>
    </div>
    <div id="userBar" class="user-bar hidden">
      <span id="userNameLabel"></span>
      <button id="logoutBtn" class="btn btn-ghost">Cerrar sesión</button>
    </div>
  </header>

  <main id="app">
    <!-- ==================== VISTA DE AUTENTICACIÓN ==================== -->
    <section id="authView" class="auth-view">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
          <button class="auth-tab" data-tab="register">Crear cuenta</button>
        </div>

        <form id="loginForm" class="auth-form" novalidate>
          <h2>Bienvenido de nuevo</h2>
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" name="email" required placeholder="tucorreo@ejemplo.com" />
          <span class="field-error" data-error-for="loginEmail"></span>

          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" name="password" required minlength="6" placeholder="••••••••" />
          <span class="field-error" data-error-for="loginPassword"></span>

          <p class="form-message" id="loginMessage"></p>
          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <form id="registerForm" class="auth-form hidden" novalidate>
          <h2>Crea tu cuenta</h2>
          <label for="registerName">Nombre completo</label>
          <input type="text" id="registerName" name="name" required placeholder="Ana Pérez" />
          <span class="field-error" data-error-for="registerName"></span>

          <label for="registerEmail">Correo electrónico</label>
          <input type="email" id="registerEmail" name="email" required placeholder="tucorreo@ejemplo.com" />
          <span class="field-error" data-error-for="registerEmail"></span>

          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" />
          <span class="field-error" data-error-for="registerPassword"></span>

          <p class="form-message" id="registerMessage"></p>
          <button type="submit" class="btn btn-primary">Registrarme</button>
        </form>
      </div>
    </section>

    <!-- ==================== VISTA DEL TABLERO ==================== -->
    <section id="boardView" class="board-view hidden">
      <div class="board-toolbar">
        <h1>Mi Tablero</h1>
        <div class="toolbar-actions">
          <select id="filterStatus" class="filter-select">
            <option value="">Todos los estados</option>
            <option value="Pendiente">Pendiente</option>
            <option value="En Progreso">En Progreso</option>
            <option value="Completada">Completada</option>
          </select>
          <select id="filterPriority" class="filter-select">
            <option value="">Todas las prioridades</option>
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
          </select>
          <button id="newTaskBtn" class="btn btn-primary">+ Nueva tarea</button>
        </div>
      </div>

      <div class="kanban-board">
        <div class="kanban-column" data-status="Pendiente">
          <h3 class="column-title status-pendiente">Pendiente <span class="count" id="countPendiente">0</span></h3>
          <div class="column-dropzone" id="col-pendiente"></div>
        </div>
        <div class="kanban-column" data-status="En Progreso">
          <h3 class="column-title status-progreso">En Progreso <span class="count" id="countProgreso">0</span></h3>
          <div class="column-dropzone" id="col-progreso"></div>
        </div>
        <div class="kanban-column" data-status="Completada">
          <h3 class="column-title status-completada">Completada <span class="count" id="countCompletada">0</span></h3>
          <div class="column-dropzone" id="col-completada"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== MODAL DE TAREA (crear/editar) ==================== -->
  <div id="taskModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nueva tarea</h2>
        <button id="closeModalBtn" class="btn-icon" aria-label="Cerrar">✕</button>
      </div>
      <form id="taskForm" novalidate>
        <input type="hidden" id="taskId" />

        <label for="taskTitle">Título *</label>
        <input type="text" id="taskTitle" name="title" required maxlength="120" placeholder="Ej. Diseñar landing page" />
        <span class="field-error" data-error-for="taskTitle"></span>

        <label for="taskDescription">Descripción</label>
        <textarea id="taskDescription" name="description" maxlength="1000" rows="3" placeholder="Detalles de la tarea..."></textarea>

        <div class="form-row">
          <div>
            <label for="taskDueDate">Fecha de vencimiento *</label>
            <input type="date" id="taskDueDate" name="dueDate" required />
            <span class="field-error" data-error-for="taskDueDate"></span>
          </div>
          <div>
            <label for="taskPriority">Prioridad</label>
            <select id="taskPriority" name="priority">
              <option value="Baja">Baja</option>
              <option value="Media" selected>Media</option>
              <option value="Alta">Alta</option>
            </select>
          </div>
        </div>

        <label for="taskStatus">Estado</label>
        <select id="taskStatus" name="status">
          <option value="Pendiente">Pendiente</option>
          <option value="En Progreso">En Progreso</option>
          <option value="Completada">Completada</option>
        </select>

        <p class="form-message" id="taskFormMessage"></p>

        <div class="modal-actions">
          <button type="button" id="deleteTaskBtn" class="btn btn-danger hidden">Eliminar</button>
          <button type="submit" class="btn btn-primary">Guardar tarea</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/src/ts/main.ts"></script>
</body>
</html>
